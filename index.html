<!doctype html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octovel</title>
    <meta
        name="description"
        content="Fast, lightweight, and reliable open-source tools for developers."
    />
    <meta
        name="keywords"
        content="opensource, developer tools, SDKs, collaboration, free"
    />
    <meta name="author" content="Octovel Team" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#106ECC" />

    <!-- Favicons -->
    <link
        rel="icon"
        type="image/png"
        sizes="32x32"
        href="/assets/favicon-32x32.png"
    />
    <link
        rel="icon"
        type="image/png"
        sizes="16x16"
        href="/assets/favicon-16x16.png"
    />
    <link
        rel="apple-touch-icon"
        sizes="180x180"
        href="/assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Discord / Facebook -->
    <meta property="og:type" content="website" />
    <meta
        property="og:title"
        content="Octovel"
    />
    <meta
        property="og:description"
        content="Fast, lightweight, and reliable open-source tools for developers."
    />
    <meta property="og:url" content="http://localhost:4000/" />
    <meta
        property="og:image"
        content="/assets/preview.png"
    />
    <meta property="og:site_name" content="Octovel" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
        name="twitter:title"
        content="Octovel"
    />
    <meta
        name="twitter:description"
        content="Fast, lightweight, and reliable open-source tools for developers."
    />
    <meta
        name="twitter:image"
        content="/assets/preview.png"
    />
    <meta name="twitter:site" content="@octovel" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/assets/css/main.css" />
